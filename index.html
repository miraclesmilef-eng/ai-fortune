<!DOCTYPE html>

    :root {

      --gold: #D4AF37;
      --gold-light: #F0D060;
      --cream: #FFF8E7;

      border-radius: 8px; color: var(--lavender); padding: 0.7rem 0.5rem;

    .theme-btn.active { background: rgba(212,175,55,0.18); border-color: var(--gold); color: var(--gold); }
    .btn-primary {
      width: 100%; background: linear-gradient(135deg, #6B3FA0, #D4AF37);
      border: none; border-radius: 8px; color: #0d0521;
      padding: 1rem; font-family: 'Cinzel', serif; font-size: 1rem;

    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      background: transparent; border: 1px solid rgba(212,175,55,0.35); border-radius: 8px;

    .spread-label { font-size: 0.8rem; color: var(--lavender); font-style: italic; }

    .reading-section { margin-top: 0.5rem; }
    .reading-text { color: var(--cream); line-height: 2.1; font-size: 1rem; }
    .reading-pos-title { font-family: 'Cinzel', serif; font-size: 0.8rem; color: var(--gold); letter-spacing: 0.12em; margin-top: 1rem; margin-bottom: 0.2rem; opacity: 0.85; }
    .today-msg { border-top: 1px solid rgba(212,175,55,0.25); margin-top: 1.2rem; padding-top: 1rem; color: var(--gold-light); font-style: italic; text-align: center; font-size: 1rem; }
    .spread-divider { border: none; border-top: 1px solid rgba(212,175,55,0.2); margin: 1.5rem 0; }

    .deep-panel-title { font-family: 'Cinzel', serif; color: var(--text-muted); font-size: 0.85rem; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 0.5rem; }
    .deep-intro { font-size: 0.9rem; color: var(--lavender); font-style: italic; margin-bottom: 1.2rem; line-height: 1.7; }
    .blur-wrap { position: relative; overflow: hidden; border-radius: 8px; }
    .blur-text { color: var(--cream); line-height: 2.1; font-size: 1rem; filter: blur(5px); user-select: none; pointer-events: none; opacity: 0.6; }
    .blur-overlay {

</head>

<div class="container">

  <div class="stars">⋆ ✦ ⋆ ✦ ⋆</div>

        <a href="https://note.com/sumina_kiko" class="cta-note-full" target="_blank" rel="noopener">📖 noteで詳しい解説を読む</a>
      </div>
    </div>
  </div>

  <!-- 入力画面 -->

    <div class="panel">
      <p class="panel-title">鑑定の準備</p>
      <div class="remaining-badge">
        <span style="color:var(--text-muted);">本日の残り無料鑑定</span>
        <span class="remaining-count" id="remaining-count">2回</span>
      </div>
      <label for="birthdate">生年月日</label>
      <input type="date" id="birthdate" max="2010-12-31" />
      <p style="color:var(--lavender);font-size:0.88rem;margin-bottom:0.5rem;letter-spacing:0.05em;">鑑定テーマを選んでください</p>
      <div class="theme-grid">

        <button class="theme-btn" data-theme="work">💼 仕事・キャリア</button>

      </div>
      <div id="error-msg" class="error-msg hidden"></div>
      <button class="btn-primary" onclick="drawCards()">カードを引く ✨</button>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="step-result" class="hidden">

    <!-- Spread 1: 心・言葉・行動 -->
    <div class="panel">
      <p class="panel-title">心 · 言葉 · 行動</p>
      <div class="spread-row" id="spread1-cards"></div>
      <div class="reading-section" id="spread1-reading"></div>
    </div>

    <div class="panel">
      <p class="deep-panel-title">潜在 · 顕在 · 可能性</p>
      <p class="deep-intro">あなたの深層に眠るメッセージが、3枚のカードに宿っています。</p>
      <div class="spread-row" id="spread2-cards"></div>
      <div class="blur-wrap" id="spread2-blur-wrap">
        <div class="blur-text" id="spread2-reading"></div>
        <div class="blur-overlay">
          <a href="https://note.com/sumina_kiko" class="cta-note" target="_blank" rel="noopener">
            🔓 続きの深層読みはnoteで →
          </a>
        </div>
      </div>
    </div>

    <div style="text-align:center;margin-bottom:1rem;">
      <button class="btn-secondary" onclick="resetApp()">もう一度引く</button>
    </div>
  </div>

  <div class="stars" style="margin-top:1rem;">⋆ ✦ ⋆ ✦ ⋆</div>
</div>

function getSunSign(dateStr) {
  const d = new Date(dateStr), m = d.getMonth()+1, day = d.getDate(), md = m*100+day;
  if (md>=1222||md<=119) return '山羊座';
  if (md<=218) return '水瓶座'; if (md<=320) return '魚座';
  if (md<=419) return '牡羊座'; if (md<=520) return '牡牛座';
  if (md<=621) return '双子座'; if (md<=722) return '蟹座';
  if (md<=822) return '獅子座'; if (md<=922) return '乙女座';
  if (md<=1023) return '天秤座'; if (md<=1121) return '蠍座';
  return '射手座';
}

const THEME_LABELS = { love:'恋愛・人間関係', work:'仕事・キャリア', money:'金運・お金', general:'総合運' };

function getUsageData() {
  const today = new Date().toLocaleDateString('ja-JP');
  const raw = localStorage.getItem('fortune_usage');
  if (!raw) return { date: today, count: 0 };
  const data = JSON.parse(raw);
  return data.date !== today ? { date: today, count: 0 } : data;
}

function saveUsage(count) {
  const today = new Date().toLocaleDateString('ja-JP');
  localStorage.setItem('fortune_usage', JSON.stringify({ date: today, count }));
}

function updateRemaining(count) {
  document.getElementById('remaining-count').textContent = Math.max(0, MAX_USES - count) + '回';
}

function initApp() {
  const usage = getUsageData();
  if (usage.count >= MAX_USES) {
    document.getElementById('step-locked').classList.remove('hidden');
    document.getElementById('step-setup').classList.add('hidden');
  } else {
    updateRemaining(usage.count);
  }
}

let selectedTheme = '';
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTheme = btn.dataset.theme;
  });
});

function buildCard(card, posKey) {
  return `<div class="spread-item">
    <div class="s-card">
      <span class="s-card-num">${card.id}</span>
      <img class="s-card-img" src="CARD/LC_${String(card.id).padStart(2,'0')}.png" alt="${card.name}" />
      <span class="s-card-name">${card.name}</span>
    </div>
    <span class="spread-pos">${posKey}</span>
    <span class="spread-label">${card.meaning}</span>
  </div>`;
}

function drawCards() {
  const usage = getUsageData();
  if (usage.count >= MAX_USES) {
    document.getElementById('step-setup').classList.add('hidden');
    document.getElementById('step-locked').classList.remove('hidden');
    return;
  }
  const birthdate = document.getElementById('birthdate').value;
  if (!birthdate) { document.getElementById('error-msg').textContent='生年月日を選択してください'; document.getElementById('error-msg').classList.remove('hidden'); return; }
  if (!selectedTheme) { document.getElementById('error-msg').textContent='鑑定テーマを選んでください'; document.getElementById('error-msg').classList.remove('hidden'); return; }
  document.getElementById('error-msg').classList.add('hidden');

  const newCount = usage.count + 1;
  saveUsage(newCount);
  updateRemaining(newCount);

  const shuffled = [...CARDS].sort(() => Math.random() - 0.5);
  const [c1, c2, c3] = shuffled.slice(0, 3);
  const [c4, c5, c6] = shuffled.slice(3, 6);
  const signName = getSunSign(birthdate);
  const sign = SIGNS[signName];
  const theme = selectedTheme;

  // Spread 1カード表示
  document.getElementById('spread1-cards').innerHTML =
    buildCard(c1, '心') + buildCard(c2, '言葉') + buildCard(c3, '行動');

  // Spread 1鑑定文
  const s1reading = `${sign.intro}\n\n` +
    `◇ 心 — ${c1.name}\n${c1.pos.heart} ${c1.themes[theme]}\n\n` +
    `◇ 言葉 — ${c2.name}\n${c2.pos.word} ${c2.themes[theme]}\n\n` +
    `◇ 行動 — ${c3.name}\n${c3.pos.action}\n\n` +
    `${sign.q}\n\n✨ ${pick([c1, c2, c3]).msg} ✨`;

  document.getElementById('spread1-reading').innerHTML =
    `<p class="reading-text">${escHtml(s1reading)}</p>`;

  // Spread 2カード表示
  document.getElementById('spread2-cards').innerHTML =
    buildCard(c4, '潜在') + buildCard(c5, '顕在') + buildCard(c6, '可能性');

  // Spread 2ぼかし鑑定文（teaser）
  const s2text =
    `◇ 潜在 — ${c4.name}\n${c4.pos.hidden}\n\n` +
    `◇ 顕在 — ${c5.name}\n${c5.pos.surface}\n\n` +
    `◇ 可能性 — ${c6.name}\n${c6.pos.potential}\n\n` +
    `あなたの深層には、まだ言葉になっていない大きな物語が眠っています。\nこの3枚が示す本当の意味と、あなたが開く可能性の全貌は…`;
  document.getElementById('spread2-reading').textContent = s2text;

  document.getElementById('step-setup').classList.add('hidden');
  document.getElementById('step-result').classList.remove('hidden');
  if (newCount >= MAX_USES) {
    document.getElementById('spread1-reading').innerHTML +=
      '<p style="font-size:0.88rem;color:var(--text-muted);margin-top:1rem;font-style:italic;">— 本日の無料鑑定はこれが最後です。また明日お越しください。</p>';
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetApp() {
  const usage = getUsageData();
  if (usage.count >= MAX_USES) {
    document.getElementById('step-result').classList.add('hidden');
    document.getElementById('step-locked').classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  selectedTheme = '';
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('step-result').classList.add('hidden');
  document.getElementById('step-setup').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
