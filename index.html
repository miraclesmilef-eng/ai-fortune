      general:'正直に言うと、今日は逃げたい気持ちになるかもしれません。でも、ここが踏ん張りどころです。'
    },
    msg:'あなたが背負っているものは、あなたにしか背負えないものです。'
  },
];

function getSunSign(dateStr) {
  const d = new Date(dateStr), m = d.getMonth()+1, day = d.getDate(), md = m*100+day;
  if (md>=1222||md<=119) return '山羊座';
  if (md<=218) return '水瓶座';
  if (md<=320) return '魚座';
  if (md<=419) return '牡羊座';
  if (md<=520) return '牡牛座';
  if (md<=621) return '双子座';
  if (md<=722) return '蟹座';
  if (md<=822) return '獅子座';
  if (md<=922) return '乙女座';
  if (md<=1023) return '天秤座';
  if (md<=1121) return '蠍座';
  return '射手座';
}

function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

const MAX_USES = 2;

function getUsageData() {
  const today = new Date().toLocaleDateString('ja-JP');
  const raw = localStorage.getItem('fortune_usage');
  if (!raw) return { date: today, count: 0 };
  const data = JSON.parse(raw);
  if (data.date !== today) return { date: today, count: 0 };
  return data;
}

function saveUsage(count) {
  const today = new Date().toLocaleDateString('ja-JP');
  localStorage.setItem('fortune_usage', JSON.stringify({ date: today, count }));
}

function updateRemainingDisplay(count) {
  const left = Math.max(0, MAX_USES - count);
  document.getElementById('remaining-count').textContent = left + '回';
}

function initApp() {
  const usage = getUsageData();
  if (usage.count >= MAX_USES) {
    document.getElementById('step-locked').classList.remove('hidden');
    document.getElementById('step-setup').classList.add('hidden');
  } else {
    updateRemainingDisplay(usage.count);
  }
}

let selectedTheme = '';

document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTheme = btn.dataset.theme;
  });
});

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function drawCard() {
  const usage = getUsageData();
  if (usage.count >= MAX_USES) {
    document.getElementById('step-setup').classList.add('hidden');
    document.getElementById('step-locked').classList.remove('hidden');
    return;
  }

  const birthdate = document.getElementById('birthdate').value;
  if (!birthdate) return showError('生年月日を選択してください');
  if (!selectedTheme) return showError('鑑定テーマを選んでください');
  document.getElementById('error-msg').classList.add('hidden');

  const newCount = usage.count + 1;
  saveUsage(newCount);
  updateRemainingDisplay(newCount);

  const card = CARDS[Math.floor(Math.random() * CARDS.length)];
  const signName = getSunSign(birthdate);
  const sign = SIGNS[signName];

  document.getElementById('r-num').textContent = card.id;
  document.getElementById('r-num2').textContent = card.id;
  document.getElementById('r-emoji').textContent = card.emoji;
  document.getElementById('r-name').textContent = card.name;
  document.getElementById('r-meaning').textContent = card.meaning;
  document.getElementById('r-sign').textContent = signName + ' ' + sign.sym;

  const body = sign.intro + '\n\n' + pick(card.base) + '\n\n' + card.themes[selectedTheme] + '\n\n' + sign.q;
  document.getElementById('r-body').textContent = body;
  document.getElementById('r-today').textContent = '✨ ' + card.msg + ' ✨';

  if (newCount >= MAX_USES) {
    document.getElementById('r-body').textContent += '\n\n— 本日の無料鑑定はこれで最後です。続きはLINEでどうぞ。';
  }

  document.getElementById('step-setup').classList.add('hidden');
  document.getElementById('step-result').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetApp() {
  const usage = getUsageData();
  if (usage.count >= MAX_USES) {
    document.getElementById('step-result').classList.add('hidden');
    document.getElementById('step-locked').classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  selectedTheme = '';
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('step-setup').classList.remove('hidden');
  document.getElementById('step-result').classList.add('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

initApp();
</script>
</body>
</html>
